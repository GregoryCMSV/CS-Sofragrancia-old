name: Deploy UI to GitHub Pages

on:
  push:
    branches: [ main ]
  
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar o .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' 

    - name: Publicar o projeto (Build)
      run: dotnet publish Sofragrancia/Sofragrancia-Gerencial/Sofragrancia.UI/Sofragrancia.UI.csproj -c Release -o release --nologo

    - name: Adicionar arquivo .nojekyll
      run: touch release/wwwroot/.nojekyll

    - name: Deploy para o GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: release/wwwroot
        branch: gh-pages
